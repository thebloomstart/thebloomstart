<svg width="800" height="230" viewBox="0 0 800 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      .g1{animation:fadeIn 0.5s 0.05s ease both}
      .g2{animation:fadeIn 0.5s 0.12s ease both}
      .g3{animation:fadeIn 0.5s 0.19s ease both}
      .g4{animation:fadeIn 0.5s 0.26s ease both}
      .g5{animation:fadeIn 0.5s 0.33s ease both}
      .g6{animation:fadeIn 0.5s 0.40s ease both}
    </style>
  </defs>

  <rect width="800" height="230" rx="18" fill="#0f0d0f"/>
  <rect width="800" height="230" rx="18" fill="none" stroke="#2a1a20" stroke-width="1"/>

  <text x="40" y="30" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="11" fill="#6b3a48" letter-spacing="3" font-weight="500">2026 · GOALS</text>
  <rect x="32" y="40" width="736" height="0.5" fill="#1e1218"/>

  <!-- Goal rows -->
  <g class="g1">
    <text x="56" y="68" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#4a2a32">Ship Bloom Core v1.0</text>
    <text x="40" y="68" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#c9728a">✓</text>
  </g>
  <g class="g2">
    <text x="56" y="93" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#4a2a32">Launch public bot suite</text>
    <text x="40" y="93" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#c9728a">✓</text>
  </g>
  <g class="g3">
    <text x="56" y="118" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#9a7060">Reach 100 GitHub stars</text>
    <text x="40" y="118" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#7a5040">◌</text>
  </g>
  <g class="g4">
    <text x="56" y="143" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#9a7060">Build full Electron app</text>
    <text x="40" y="143" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#7a5040">◌</text>
  </g>
  <g class="g5">
    <text x="56" y="168" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#3a1a22">Expand Bloom team</text>
    <text x="40" y="168" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#2a1a20">·</text>
  </g>
  <g class="g6">
    <text x="56" y="193" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#3a1a22">1000+ Telegram subscribers</text>
    <text x="40" y="193" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="12" fill="#2a1a20">·</text>
  </g>

  <rect x="32" y="208" width="736" height="0.5" fill="#1e1218"/>
  <!-- Progress bar -->
  <rect x="40" y="216" width="720" height="3" rx="1.5" fill="#1a1018"/>
  <rect x="40" y="216" width="240" height="3" rx="1.5" fill="#c9728a"/>
  <text x="760" y="221" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="10" fill="#6b3a48" text-anchor="end">2 / 6</text>
</svg>
