<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes waveDrift { 0%{transform:translateX(0)} 100%{transform:translateX(-800px)} }
      @keyframes fadeDrop { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      .title { animation: fadeDrop 1s 0.2s ease both; }
      .sub { animation: fadeUp 1s 0.5s ease both; }
      .wave1 { animation: waveDrift 18s linear infinite; }
      .wave2 { animation: waveDrift 22s linear infinite reverse; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d12"/>
      <stop offset="100%" stop-color="#0d0809"/>
    </linearGradient>
    <linearGradient id="wg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9728a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9728a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a3a52" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8a3a52" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Animated wave shapes -->
  <g class="wave1">
    <path d="M0,120 C80,90 160,150 240,120 C320,90 400,150 480,120 C560,90 640,150 720,120 C800,90 880,150 960,120 C1040,90 1120,150 1200,120 L1200,200 L0,200 Z" fill="url(#wg1)"/>
  </g>
  <g class="wave2">
    <path d="M0,140 C100,110 200,165 300,140 C400,115 500,165 600,140 C700,115 800,165 900,140 C1000,115 1100,165 1200,140 L1200,200 L0,200 Z" fill="url(#wg2)"/>
  </g>

  <!-- Subtle grid lines -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#2a1220" stroke-width="0.5" stroke-dasharray="2,40"/>

  <!-- Main title -->
  <text class="title" x="400" y="95" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="64" fill="#e8c0cc" font-weight="600" text-anchor="middle" letter-spacing="12">ZYNAPSE</text>

  <!-- Subtitle -->
  <text class="sub" x="400" y="128" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="13" fill="#7a4a58" font-weight="400" text-anchor="middle" letter-spacing="4">Senior Developer  ·  Bloom Project CEO</text>

  <!-- Bottom fade -->
  <rect x="0" y="160" width="800" height="40" fill="url(#bg)" opacity="0.6"/>
</svg>
