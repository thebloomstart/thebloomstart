  <text x="400" y="48" font-family="-apple-system,SF Pro Display,Helvetica Neue,sans-serif" font-size="9" fill="#8a3a52" text-anchor="middle" letter-spacing="3.5" font-weight="500" style="fill:rgb(138, 58, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;SF Pro Display&quot;, &quot;Helvetica Neue&quot;, sans-serif;font-size:9px;font-weight:500;text-anchor:middle;dominant-baseline:auto">BLOOM PROJECT  ·  BUILDING WITH PURPOSE, SHIPPING WITH INTENTION</text>
