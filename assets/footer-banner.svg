    </linearGradient>
    <linearGradient id="fwg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4789a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4789a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ftopLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a0b4" stop-opacity="0"/>
      <stop offset="25%" stop-color="#d4789a" stop-opacity="0.55"/>
      <stop offset="75%" stop-color="#d4789a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8a0b4" stop-opacity="0"/>
