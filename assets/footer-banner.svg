      <path d="M0,42 C100,24 200,58 300,42 C400,26 500,58 600,42 C700,26 800,58 900,42 C1000,26 1100,58 1200,42 L1200,0 L0,0 Z" fill="url(#fwg2)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
